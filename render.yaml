services:
  # Backend API — FastAPI + SQLite
  - type: web
    name: sec-analyst-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///app.db
      - key: SEC_USER_AGENT
        value: "SEC Financial Analyst contact@example.com"
      - key: ENVIRONMENT
        value: production
      - key: PREFETCH_ENABLED
        value: false

# Frontend deployed separately as a static site (not via Blueprint)
# See deployment instructions — create it manually on Render dashboard:
#   Type: Static Site
#   Build Command: cd frontend && npm install && npm run build
#   Publish Path: frontend/dist
#   Env: VITE_API_BASE = https://sec-analyst-api.onrender.com
#   Env: VITE_GA_ID = G-45EEYCC4CC
