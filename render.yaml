services:
  # Backend API — FastAPI + SQLite
  - type: web
    name: sec-analyst-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///app.db
      - key: SEC_USER_AGENT
        value: "SEC Financial Analyst contact@example.com"
      - key: ENVIRONMENT
        value: production
      - key: PREFETCH_ENABLED
        value: false
      # Add your Qwen API key in Render dashboard:
      # - key: QWEN_API_KEY
      #   sync: false    (Render will prompt you to enter it)
      # - key: QWEN_BASE_URL
      #   value: https://ws-0exjku32k70c5ir6.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
      # - key: QWEN_MODEL
      #   value: qwen3.7-plus

  # Frontend — React static site
  - type: web
    name: sec-analyst-frontend
    runtime: static
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://sec-analyst-api.onrender.com
      - key: VITE_GA_ID
        value: G-45EEYCC4CC
